<style>
:root {
  --accent:        #f97316;
  --accent-soft:   #fb923c;
  --bg:            #0a0a0f;
  --bg-elev:       #14141d;
  --bg-card:       #1a1a25;
  --border:        rgba(255,255,255,.08);
  --text:          #f5f5f7;
  --text-muted:    #9ca3af;
  --shadow:        0 10px 40px rgba(0,0,0,.4);
  --shadow-glow:   0 0 40px rgba(249,115,22,.25);
  --radius:        1rem;
  --radius-lg:     1.5rem;
  --nav-h:         64px;
  --transition:    .25s ease;
}

html[data-theme="light"] {
  --bg:            #fafafa;
  --bg-elev:       #ffffff;
  --bg-card:       #ffffff;
  --border:        rgba(0,0,0,.08);
  --text:          #1a1a25;
  --text-muted:    #6b7280;
  --shadow:        0 10px 30px rgba(0,0,0,.08);
  --shadow-glow:   0 0 40px rgba(249,115,22,.18);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  font-size: 1rem;
  line-height: 1.7;
  color: var(--text);
  background: var(--bg);
  min-height: 100dvh;
  transition: background var(--transition), color var(--transition);
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(60% 50% at 50% 0%, rgba(249,115,22,.10), transparent 70%),
    radial-gradient(40% 35% at 80% 90%, rgba(168,85,247,.06), transparent 70%);
  pointer-events: none;
  z-index: -1;
  transition: opacity var(--transition);
}
html[data-theme="light"] body::before { opacity: .4; }

img, svg { display: block; max-width: 100%; }
a { color: inherit; text-decoration: none; }
button { font: inherit; color: inherit; cursor: pointer; background: none; border: none; }
::selection { background: var(--accent); color: #fff; }

h1, h2, h3 { font-weight: 700; line-height: 1.15; }

.container { max-width: 1100px; margin-inline: auto; padding-inline: 1.5rem; }
.section   { padding-block: 96px 120px; }
.section-projects { padding-block: 32px 64px; }
.section-video    { padding-block: 32px 96px; }

#navbar {
  position: fixed;
  inset-block-start: 1.25rem;
  inset-inline: 0;
  z-index: 1000;
  display: flex;
  justify-content: center;
  pointer-events: none;
}

.nav-pill {
  pointer-events: auto;
  display: flex;
  align-items: center;
  gap: 1.5rem;
  padding: .5rem 1.25rem;
  background: rgba(20,20,29,.6);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border: 1px solid var(--border);
  border-radius: 999px;
  box-shadow: 0 8px 32px rgba(0,0,0,.3);
  transition: background var(--transition);
}
html[data-theme="light"] .nav-pill {
  background: rgba(255,255,255,.7);
  box-shadow: 0 4px 24px rgba(0,0,0,.08);
}
.nav-pill--scrolled { padding: .35rem 1rem; box-shadow: 0 12px 36px rgba(0,0,0,.45); }
html[data-theme="light"] .nav-pill--scrolled { box-shadow: 0 8px 28px rgba(0,0,0,.12); }

.nav-logo {
  font-family: 'Pacifico', cursive;
  font-size: 1.5rem;
  color: var(--accent);
  text-shadow: 0 0 18px rgba(249,115,22,.6);
  letter-spacing: 1px;
  padding-inline-end: .25rem;
  cursor: pointer;
}

.nav-links {
  display: flex;
  align-items: center;
  gap: .1rem;
  list-style: none;
}

.nav-text-link {
  font-size: .82rem;
  font-weight: 500;
  color: var(--text-muted);
  padding: .3rem .65rem;
  border-radius: 999px;
  transition: color var(--transition), background var(--transition);
  letter-spacing: .01em;
  white-space: nowrap;
  cursor: pointer;
}
.nav-text-link:hover,
.nav-text-link.active {
  color: var(--accent);
  background: rgba(249,115,22,.1);
}

.nav-icons { display: flex; align-items: center; gap: .25rem; }

.nav-icon {
  width: 38px; height: 38px;
  border-radius: 50%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  color: var(--text-muted);
  transition: color var(--transition), background var(--transition), transform var(--transition);
}
.nav-icon svg { width: 18px; height: 18px; }
.nav-icon:hover { color: var(--accent); background: rgba(249,115,22,.1); transform: translateY(-1px); }
.nav-icon:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

.theme-toggle .icon-sun  { display: none; }
.theme-toggle .icon-moon { display: block; }
html[data-theme="light"] .theme-toggle .icon-sun  { display: block; }
html[data-theme="light"] .theme-toggle .icon-moon { display: none; }

.hero {
  min-height: 80dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: calc(var(--nav-h) + 2rem) 1.5rem 2rem;
  position: relative;
}

.profile-photo {
  width: 150px; height: 150px;
  border-radius: 50%;
  object-fit: cover;
  object-position: center top;
  border: 3px solid var(--accent);
  padding: 4px;
  background: var(--bg);
  box-shadow: var(--shadow-glow), 0 0 0 1px var(--border);
  margin-bottom: 2rem;
  animation: floatPhoto 6s ease-in-out infinite;
}
@keyframes floatPhoto {
  0%, 100% { transform: translateY(0); }
  50%      { transform: translateY(-8px); }
}

.hero-name {
  font-size: clamp(2.2rem, 6vw, 3.5rem);
  font-weight: 800;
  color: var(--accent);
  margin-bottom: 1rem;
  letter-spacing: -.02em;
  text-shadow: 0 0 30px rgba(249,115,22,.3);
}
.hero-role {
  font-size: clamp(1.1rem, 2.5vw, 1.4rem);
  font-weight: 600;
  color: var(--text);
  margin-bottom: 1rem;
}
.hero-bio {
  max-width: 540px;
  color: var(--text-muted);
  font-size: 1.05rem;
  margin-bottom: 2rem;
  line-height: 1.65;
}

.hero-socials {
  display: flex;
  gap: .65rem;
  justify-content: center;
  flex-wrap: wrap;
}
.social-icon {
  width: 44px; height: 44px;
  border-radius: 50%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text);
  transition: background var(--transition), color var(--transition),
              transform var(--transition), border-color var(--transition);
}
.social-icon svg { width: 18px; height: 18px; }
.social-icon:hover {
  background: var(--accent); color: #fff;
  border-color: var(--accent);
  transform: translateY(-3px);
  box-shadow: 0 8px 20px rgba(249,115,22,.35);
}

.section-title {
  font-size: clamp(1.5rem, 4vw, 2rem);
  font-weight: 700;
  text-align: center;
  margin-bottom: 2.25rem;
  color: var(--text);
  position: relative;
}
.section-title::after {
  content: '';
  display: block;
  width: 40px; height: 3px;
  background: linear-gradient(90deg, var(--accent), var(--accent-soft));
  border-radius: 999px;
  margin: .65rem auto 0;
  transition: width .5s ease;
}
.section-title:hover::after { width: 80px; }

.proj-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1.25rem;
}
.proj-card {
  display: flex;
  flex-direction: column;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  transition: transform var(--transition), border-color var(--transition), box-shadow var(--transition);
  color: inherit;
  cursor: pointer;
}
.proj-card:hover {
  transform: translateY(-6px);
  border-color: rgba(249,115,22,.4);
  box-shadow: var(--shadow);
}
.proj-thumb {
  width: 100%;
  aspect-ratio: 16/9;
  overflow: hidden;
  background: var(--bg-card);
}
.proj-thumb img {
  width: 100%; height: 100%;
  object-fit: cover;
  object-position: top;
  display: block;
  transition: transform .4s ease;
}
.proj-card:hover .proj-thumb img { transform: scale(1.04); }
.proj-info {
  padding: 1rem 1.2rem 1.3rem;
  display: flex;
  flex-direction: column;
  gap: .35rem;
}
.proj-title { font-size: 1.1rem; font-weight: 700; color: var(--accent); margin: 0; }
.proj-desc  { font-size: .875rem; color: var(--text-muted); line-height: 1.55; margin: 0; }

.all-work-row { margin-top: 2rem; text-align: center; }
.all-work-link {
  color: var(--text-muted);
  font-size: 1rem;
  font-weight: 600;
  text-decoration: none;
  transition: color var(--transition);
  letter-spacing: .02em;
  cursor: pointer;
}
.all-work-link:hover { color: var(--accent); }

@media (max-width: 700px) { .proj-grid { grid-template-columns: 1fr; } }

.video-wrap {
  position: relative;
  width: 100%;
  max-width: 900px;
  margin-inline: auto;
  aspect-ratio: 16 / 9;
  border-radius: var(--radius-lg);
  overflow: hidden;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  background: #000;
}
.video-wrap iframe {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  border: 0;
}

.footer {
  padding-block: 2.5rem;
  border-top: 1px solid var(--border);
  text-align: center;
}
.footer-copy { color: var(--text-muted); font-size: .85rem; }

.inner-page {
  min-height: 100dvh;
  padding-top: calc(var(--nav-h) + 2.5rem);
  padding-bottom: 4rem;
}
.container-narrow { max-width: 720px; margin-inline: auto; padding-inline: 1.5rem; }

.page-title {
  font-size: clamp(1.8rem, 5vw, 2.6rem);
  font-weight: 800;
  background: linear-gradient(135deg, var(--accent), var(--accent-soft));
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  margin-bottom: .4rem;
  letter-spacing: -.02em;
  animation: titleIn .7s ease both;
}
@keyframes titleIn {
  from { opacity: 0; transform: translateY(-12px); }
  to   { opacity: 1; transform: none; }
}
.page-subtitle {
  color: var(--text-muted);
  font-size: 1rem;
  margin-bottom: 2.25rem;
  animation: titleIn .8s .1s ease both;
}

.about-card {
  display: flex;
  gap: 1.5rem;
  align-items: flex-start;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 1.5rem 1.75rem;
  margin-bottom: 1.25rem;
  transition: border-color var(--transition), transform var(--transition);
}
.about-card:hover { border-color: rgba(249,115,22,.3); transform: translateY(-2px); }
.profile-photo-sm {
  width: 88px; height: 88px;
  border-radius: 50%;
  object-fit: cover;
  object-position: center top;
  border: 2px solid var(--accent);
  flex-shrink: 0;
  box-shadow: 0 0 20px rgba(249,115,22,.25);
}
.about-text h2 { font-size: 1.3rem; margin-bottom: .2rem; }
.about-role { color: var(--accent); font-size: .85rem; font-weight: 600; margin-bottom: .65rem; }
.about-text p { color: var(--text-muted); font-size: .92rem; margin-bottom: .55rem; line-height: 1.6; }

.stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 1.25rem; }
.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1rem;
  text-align: center;
  transition: transform var(--transition), border-color var(--transition);
}
.stat-card:hover { transform: translateY(-3px); border-color: rgba(249,115,22,.35); }
.stat-num { font-size: 1.6rem; font-weight: 800; color: var(--accent); display: block; line-height: 1.1; }
.stat-label { font-size: .72rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: .08em; margin-top: .25rem; display: block; }

.info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .9rem; }
.info-block {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1rem 1.2rem;
  transition: border-color var(--transition), transform var(--transition);
}
.info-block:hover { border-color: rgba(249,115,22,.3); transform: translateY(-2px); }
.info-block h3 {
  font-size: .8rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: .06em;
  color: var(--accent); margin-bottom: .6rem;
}
.info-block p, .info-block li { color: var(--text-muted); font-size: .9rem; line-height: 1.6; }
.info-block ul { padding-inline-start: 1.1rem; }
.tag-row { display: flex; flex-wrap: wrap; gap: .4rem; }
.tag {
  font-size: .75rem; font-weight: 600;
  padding: .2rem .6rem;
  border-radius: 999px;
  background: rgba(249,115,22,.12);
  color: var(--accent-soft);
}
.inline-link { color: var(--accent); text-decoration: underline; text-underline-offset: 3px; }

.timeline { list-style: none; position: relative; padding-inline-start: 1.75rem; }
.timeline::before {
  content: '';
  position: absolute;
  inset-block: 0;
  inset-inline-start: .45rem;
  width: 2px;
  background: linear-gradient(180deg, var(--accent), transparent);
  border-radius: 999px;
  opacity: .5;
}
.tl-item { position: relative; margin-bottom: 1.5rem; }
.tl-dot {
  position: absolute;
  inset-inline-start: -1.4rem;
  inset-block-start: .55rem;
  width: 11px; height: 11px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 0 4px rgba(249,115,22,.15), 0 0 12px rgba(249,115,22,.7);
  animation: pulseDot 2.4s ease-in-out infinite;
}
@keyframes pulseDot {
  0%,100% { box-shadow: 0 0 0 4px rgba(249,115,22,.15), 0 0 12px rgba(249,115,22,.6); }
  50%     { box-shadow: 0 0 0 8px rgba(249,115,22,.05), 0 0 18px rgba(249,115,22,.9); }
}
.tl-content {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: .9rem 1.2rem;
  transition: border-color var(--transition), transform var(--transition), box-shadow var(--transition);
}
.tl-content:hover { border-color: rgba(249,115,22,.4); transform: translateX(4px); box-shadow: 0 6px 20px rgba(0,0,0,.2); }
.tl-date { font-size: .75rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--accent); display: block; margin-bottom: .3rem; }
.tl-content h3 { font-size: 1.05rem; margin-bottom: .3rem; }
.tl-content p  { color: var(--text-muted); font-size: .9rem; line-height: 1.55; }

.story-body { display: flex; flex-direction: column; gap: 1.1rem; }
.story-body p { color: var(--text-muted); font-size: 1rem; line-height: 1.75; }
.story-body em { color: var(--text); font-style: italic; }
.story-closing { color: var(--accent) !important; font-weight: 700; font-size: 1.05rem !important; margin-top: .5rem; }
.story-quote {
  border-inline-start: 3px solid var(--accent);
  background: rgba(249,115,22,.06);
  padding: 1rem 1.25rem;
  border-radius: 0 var(--radius) var(--radius) 0;
  font-style: italic;
  color: var(--text) !important;
  font-size: 1.05rem !important;
}
.story-principles {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: .75rem;
  margin-top: .5rem;
}
.principle {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: .9rem 1.1rem;
  transition: border-color var(--transition), transform var(--transition);
}
.principle:hover { border-color: rgba(249,115,22,.35); transform: translateY(-2px); }
.principle h4 { color: var(--accent); font-size: .85rem; margin-bottom: .25rem; text-transform: uppercase; letter-spacing: .06em; font-weight: 700; }
.principle p { font-size: .88rem !important; line-height: 1.55 !important; margin: 0 !important; }

.reveal {
  opacity: 0;
  transform: translateY(28px);
  transition: opacity .7s cubic-bezier(.2,.7,.2,1), transform .7s cubic-bezier(.2,.7,.2,1);
  transition-delay: calc(var(--reveal-i, 0) * 80ms);
  will-change: opacity, transform;
}
.reveal.visible { opacity: 1; transform: none; }

@media (prefers-reduced-motion: reduce) {
  .reveal { transition: none; opacity: 1; transform: none; }
  .profile-photo, .tl-dot { animation: none; }
}

.status-pill {
  display: inline-flex; align-items: center; gap: .35rem;
  font-size: .7rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: .06em;
  padding: .2rem .55rem; border-radius: 999px;
  margin-inline-start: .5rem; vertical-align: middle;
}
.status-pill.live    { background: rgba(34,197,94,.15);   color: #4ade80; }
.status-pill.ongoing { background: rgba(249,115,22,.15);  color: var(--accent); }
.status-pill.archive { background: rgba(156,163,175,.15); color: var(--text-muted); }
.card-tags { display: flex; flex-wrap: wrap; gap: .3rem; margin-top: .6rem; }
.card-tags .tag { font-size: .68rem; }

@media (max-width: 700px) {
  .info-grid  { grid-template-columns: 1fr; }
  .stats-row  { grid-template-columns: repeat(3, 1fr); }
  .about-card { flex-direction: column; align-items: center; text-align: center; }
}
@media (max-width: 600px) {
  .nav-pill  { gap: .5rem; padding: .4rem .75rem; }
  .nav-logo  { font-size: 1.25rem; }
  .nav-icon  { width: 34px; height: 34px; }
  .nav-links { display: none; }
  .profile-photo { width: 130px; height: 130px; }
  .section   { padding-block: 64px 80px; }
}
</style>
